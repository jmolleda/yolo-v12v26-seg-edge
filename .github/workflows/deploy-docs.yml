name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-docs.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs mkdocs-material

      - name: Build and deploy docs
        run: |
          echo 'site_url: https://jmolleda.github.io/yolo-v12v26-seg-edge/' >> mkdocs.yml
          mkdocs build

          # Preserve results_dashboard.html from gh-pages (autopush keeps it updated)
          git show origin/gh-pages:results_dashboard.html > site/results_dashboard.html 2>/dev/null || true

          # Deploy site dir to gh-pages
          pip install ghp-import
          ghp-import -n -p -f site
