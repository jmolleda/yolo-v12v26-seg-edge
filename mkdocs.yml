site_name: YOLO v12 v26 Segmentation Edge
site_description: Benchmark framework for comparing YOLO model performance across GPU and edge devices
# site_url set at build time in CI (see .github/workflows/deploy-docs.yml)
repo_url: https://github.com/jmolleda/yolo-v12v26-seg-edge
repo_name: jmolleda/yolo-v12v26-seg-edge

theme:
  name: material
  palette:
    scheme: default
    primary: white
    accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Experimental Design: experiments.md
  - Results Dashboard: dashboard.md
  - How to Run: execution.md
  - Orchestrator Pipeline: orchestrator.md
  - Monitoring: monitoring.md
  - Hyperparameters: hyperparameters.md
  - Environment: environment.md
  - Class Imbalance: class_imbalance.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - attr_list
  - def_list
