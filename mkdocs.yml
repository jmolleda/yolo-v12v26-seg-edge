site_name: YOLO Benchmark Suite
site_description: Benchmark framework for comparing YOLO model performance across GPU and edge devices
site_url: https://jmolleda.github.io/tfm-icm/
repo_url: https://github.com/jmolleda/tfm-icm
repo_name: jmolleda/tfm-icm

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: cyan
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Experimental Design: experiments.md
  - Results Dashboard: dashboard.md
  - How to Run: execution.md
  - Monitoring: monitoring.md
  - Hyperparameters: hyperparameters.md
  - Environment: environment.md
  - Class Imbalance: class_imbalance.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - attr_list
  - def_list
